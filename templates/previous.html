<!DOCTYPE html>
<html>
<head>
<title>Previous Match Info</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
<a href="/" class="back-btn">← Back</a>

<h2>Previous Match Info</h2>

<form method="post">

<div class="grid">
<select name="team1">{% for t in teams %}<option>{{t}}</option>{% endfor %}</select>
<select name="team2">{% for t in teams %}<option>{{t}}</option>{% endfor %}</select>
<select name="venue">{% for v in venues %}<option>{{v}}</option>{% endfor %}</select>
</div>

<button>Analyze</button>

</form>

{% if result %}
<table>
<tr><th>Metric</th><th>{{team1}}</th><th>{{team2}}</th></tr>
<tr><td>Total Matches</td><td>{{total}}</td><td>-</td></tr>
<tr><td>Wins</td><td>{{t1_wins}}</td><td>{{t2_wins}}</td></tr>
<tr><td>Win %</td><td>{{t1_pct}}</td><td>{{t2_pct}}</td></tr>
<tr><td>Avg Runs</td><td>{{t1_avg}}</td><td>{{t2_avg}}</td></tr>
<tr><td>Chasing Wins</td><td>{{t1_chasing}}</td><td>{{t2_chasing}}</td></tr>
<tr><td>Defending Wins</td><td>{{t1_defending}}</td><td>{{t2_defending}}</td></tr>
</table>
{% endif %}

</div>

</body>
</html>
